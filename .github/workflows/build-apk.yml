# Build automatique de l'APK Android dans le cloud (GitHub Actions).
#
# A chaque push sur main/master (ou lancement manuel depuis l'onglet
# "Actions"), un serveur Linux construit l'APK, le met en telechargement
# (artifact) ET publie une "Release" avec un lien PERMANENT toujours a jour :
#
#   https://github.com/xxbenboy/MobilPyton/releases/latest/download/MobilPyton.apk
#
# Aucun Linux/WSL necessaire de ton cote.

name: Build Android APK

on:
  # Build AUTOMATIQUE a chaque push sur main/master.
  push:
    branches: [ main, master ]
  # Permet aussi de lancer un build a la main (Actions -> Run workflow).
  workflow_dispatch:

# Si plusieurs builds sont lances (ex. 2 push rapproches), seul le plus recent
# continue : les anciens sont annules automatiquement (pas d'attente ni de
# minutes gaspillees).
concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write       # necessaire pour publier les Releases

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Le plugin Android Gradle EXIGE Java 17. Cette action installe Java 17
      # ET pointe JAVA_HOME dessus pour toutes les etapes suivantes (sinon
      # Gradle prend le Java 11 par defaut du serveur et echoue).
      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dependances systeme (Android / build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Installer Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer "cython==0.29.36"

      # Caches : accelerent fortement les builds suivants (SDK/NDK, etc.).
      - name: Cache Buildozer (global)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-aidl2-${{ hashFiles('buildozer.spec') }}

      - name: Cache Buildozer (projet)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-aidl2-${{ hashFiles('buildozer.spec') }}

      # Estampille la version A CHAQUE build. Fait APRES le cache (la cle du
      # cache est figee a l'etape de cache, donc la modifier ici ne le casse pas).
      #
      # Version SEMANTIQUE : MAJEUR.MINEUR.CORRECTIF.BUILD
      # - MAJEUR.MINEUR.CORRECTIF (les 3 premiers) = la "base", choisie A LA MAIN
      #   par toi dans buildozer.spec (ligne "version = X.Y.Z"). Tu montes :
      #     * CORRECTIF (3e) pour un petit fix / equilibrage,
      #     * MINEUR    (2e) pour une nouvelle fonctionnalite (remet le 3e a 0),
      #     * MAJEUR    (1er) pour un gros cap (remet 2e et 3e a 0).
      # - BUILD (4e) = numero de build, ajoute AUTOMATIQUEMENT (+1 a chaque build).
      # - versionCode Android = ce meme numero de build : il ne redescend JAMAIS,
      #   donc Android voit toujours une mise a jour (jamais une vieille version).
      - name: Estampiller la version
        run: |
          set -e
          RUN=${{ github.run_number }}
          SHA7=${GITHUB_SHA:0:7}

          # Base "X.Y.Z" lue depuis buildozer.spec (ce que TOI tu controles).
          BASE=$(grep -m1 -E '^version[[:space:]]*=' buildozer.spec | sed -E 's/^version[[:space:]]*=[[:space:]]*//' | tr -d '[:space:]\r')
          # Normalise a exactement 3 segments (securite si mal saisi : 0 par defaut).
          BASE=$(printf '%s\n' "$BASE" | awk -F. '{printf "%s.%s.%s", ($1==""?0:$1), ($2==""?0:$2), ($3==""?0:$3)}')

          VERSION="$BASE.$RUN"
          echo ">>> base=$BASE  build=$RUN  =>  version $VERSION (commit $SHA7)"

          # Rend VERSION / RUN disponibles dans les etapes suivantes.
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_BUILD=$RUN"       >> "$GITHUB_ENV"

          # 1) build_info.py (affiche dans le menu).
          printf 'BUILD = "%s"\nVERSION = "%s"\nSHA = "%s"\n' \
            "$RUN" "$VERSION" "$SHA7" > src/build_info.py

          # 2) buildozer.spec : versionName complet + versionCode (numeric_version).
          #    (modification locale au build seulement ; la base reste X.Y.Z dans le depot)
          sed -i "s/^version[[:space:]]*=.*/version = $VERSION/" buildozer.spec
          if grep -qE '^[[:space:]]*#?[[:space:]]*android\.numeric_version' buildozer.spec; then
            sed -i "s/^[[:space:]]*#\?[[:space:]]*android\.numeric_version.*/android.numeric_version = $RUN/" buildozer.spec
          else
            sed -i "/^version = /a android.numeric_version = $RUN" buildozer.spec
          fi

          echo "----- src/build_info.py -----" && cat src/build_info.py
          echo "----- buildozer.spec -----" && grep -E '^version|numeric_version' buildozer.spec

      - name: Construire l'APK (debug)
        run: |
          set -e
          echo ">>> JAVA_HOME = $JAVA_HOME"
          java -version

          # 1re passe : Buildozer telecharge le SDK Android. Elle ECHOUE car la
          # licence des build-tools n'est pas acceptee (donc rien d'installe) et
          # aidl est introuvable. C'est attendu : on corrige juste apres.
          buildozer android debug || echo ">>> 1re passe terminee (echec aidl attendu)"

          SDK="$HOME/.buildozer/android/platform/android-sdk"
          # sdkmanager FONCTIONNEL pre-installe sur le serveur (compatible Java 17).
          # (celui de Buildozer, dans tools/bin, est casse pour un usage direct.)
          SYSSDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          SDKMAN="$(find "$SYSSDK/cmdline-tools" /usr/local/lib/android/sdk/cmdline-tools -name sdkmanager -type f 2>/dev/null | head -1)"
          echo ">>> sdkmanager (serveur) = $SDKMAN"

          # 1) Accepter TOUTES les licences pour le SDK de Buildozer.
          yes | "$SDKMAN" --sdk_root="$SDK" --licenses || true
          # 2) Installer des build-tools STABLES qui contiennent aidl (33.0.2).
          yes | "$SDKMAN" --sdk_root="$SDK" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

          echo ">>> build-tools presents :" && ls "$SDK/build-tools" || true
          # 3) Securite : copier aidl dans toute autre version de build-tools.
          AIDL="$SDK/build-tools/33.0.2/aidl"
          if [ -f "$AIDL" ]; then
            for d in "$SDK/build-tools"/*/ ; do
              [ -f "${d}aidl" ] || { cp "$AIDL" "${d}aidl"; chmod +x "${d}aidl"; }
            done
          else
            echo "!! aidl introuvable dans 33.0.2 -- voir le log ci-dessus"
          fi

          # 2e passe : build complet (aidl present + Gradle en Java 17).
          buildozer android debug

      # On produit DEUX fichiers :
      # - MobilPyton.apk : nom STABLE (pour le lien "latest" qui ne change jamais)
      # - MobilPyton-<version>.apk : nom UNIQUE par build. Comme le nom change a
      #   chaque fois, impossible que le telephone ressorte un ancien fichier en
      #   cache : c'est le fichier a utiliser pour etre sur d'avoir la bonne version.
      - name: Renommer l'APK
        run: |
          set -e
          cp bin/*.apk "MobilPyton.apk"
          cp bin/*.apk "MobilPyton-${APP_VERSION}.apk"
          ls -l MobilPyton*.apk

      - name: Publier l'APK (artifact telechargeable)
        uses: actions/upload-artifact@v4
        with:
          name: MobilPyton-APK
          path: MobilPyton-${{ env.APP_VERSION }}.apk
          if-no-files-found: error

      # Publie une Release a chaque push. Marquee "latest" => le lien
      # .../releases/latest/download/MobilPyton.apk pointe toujours sur la
      # version la plus recente. Le fichier versionne, lui, a un nom unique.
      - name: Publier la Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: MobilPyton (build ${{ github.run_number }})  v${{ env.APP_VERSION }}
          body: |
            APK Android genere automatiquement depuis le commit ${{ github.sha }}.
            Version : ${{ env.APP_VERSION }}

            >> Telechargement RECOMMANDE (nom unique, jamais de cache) :
            https://github.com/xxbenboy/MobilPyton/releases/download/build-${{ github.run_number }}/MobilPyton-${{ env.APP_VERSION }}.apk

            Lien "toujours la derniere version" (nom fixe, peut etre mis en cache
            par le navigateur -- vider le cache si besoin) :
            https://github.com/xxbenboy/MobilPyton/releases/latest/download/MobilPyton.apk
          files: |
            MobilPyton.apk
            MobilPyton-${{ env.APP_VERSION }}.apk
          make_latest: true
